<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results Summary</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="results-summary-container">
      <!-- LEFT SIDE -->
      <div class="score-container">
        <h1>Your Result</h1>

        <div class="result">
          <h2>76</h2>
          <p>of 100</p>
        </div>

        <h3>Great</h3>
        <p class="comment">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>

      <!-- RIGHT SIDE -->
      <div class="summary-container">
        <h3>Summary</h3>

        <div class="item reaction">
          <div class="left">
            <img src="./assets/images/icon-reaction.svg" alt="Reaction Icon" />
            <span>Reaction</span>
          </div>
          <div class="score">
            <span>80</span>
            <span>/ 100</span>
          </div>
        </div>

        <div class="item memory">
          <div class="left">
            <img src="./assets/images/icon-memory.svg" alt="Memory Icon" />
            <span>Memory</span>
          </div>
          <div class="score">
            <span>92</span>
            <span>/ 100</span>
          </div>
        </div>

        <div class="item verbal">
          <div class="left">
            <img src="./assets/images/icon-verbal.svg" alt="Verbal Icon" />
            <span>Verbal</span>
          </div>
          <div class="score">
            <span>61</span>
            <span>/ 100</span>
          </div>
        </div>

        <div class="item visual">
          <div class="left">
            <img src="./assets/images/icon-visual.svg" alt="Visual Icon" />
            <span>Visual</span>
          </div>
          <div class="score">
            <span>72</span>
            <span>/ 100</span>
          </div>
        </div>

        <button>Continue</button>
      </div>
    </div>
  </body>
</html>
